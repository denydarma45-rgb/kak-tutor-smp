<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kak Tutor - Pendamping Belajar Kelas 7</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📘 Kak Tutor</h1>
            <p>Teman setia belajar Mandiri Siswa Kelas 7 SMP</p>
        </header>

        <div class="api-section">
            <label for="apiKey">Masukkan API Key Gemini Kamu:</label>
            <input type="password" id="apiKey" placeholder="Masukkan di sini...">
            <p class="info-text">*API Key aman, langsung diproses di browsermu tanpa disimpan di server manapun.</p>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message bot-message">
                Halo! Aku Kak Tutor. Pilih mata pelajaranmu atau langsung ketik soal yang membuatmu bingung di bawah ya! 😊
            </div>
        </div>

        <div class="input-section">
            <input type="text" id="userInput" placeholder="Tulis pertanyaanmu di sini... (Contoh: cara hitung luas lingkaran)">
            <button id="sendBtn">Tanya Kakak</button>
        </div>
    </div>

    <script>
    document.getElementById('sendBtn').addEventListener('click', async () => {
        const apiKeyInput = document.getElementById('apiKey').value.trim();
        const userInputInput = document.getElementById('userInput').value.trim();
        const chatBox = document.getElementById('chatBox');

        if (!apiKeyInput) {
            alert('Mohon masukkan API Key Gemini terlebih dahulu di kotak atas!');
            return;
        }
        if (!userInputInput) return;

        // 1. Tampilkan pesan user
        const userDiv = document.createElement('div');
        userDiv.className = 'message user-message';
        userDiv.textContent = userInputInput;
        chatBox.appendChild(userDiv);
        
        document.getElementById('userInput').value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        // 2. Tampilkan Loading
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message bot-message';
        loadingDiv.textContent = 'Kak Tutor sedang mencocokkan server AI... ⚡';
        chatBox.appendChild(loadingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        const systemInstruction = `Anda adalah "Kak Tutor", asisten belajar virtual untuk anak SMP kelas 7 di Indonesia. Tugas Anda membantu menjawab seluruh mapel kelas 7 (Matematika, IPA, IPS, Bahasa, dll) sesuai Kurikulum Merdeka. 
        WAJIB JAWAB DENGAN STRUKTUR BERIKUT:
        1. Sebutkan Mata Pelajaran & Bab Buku terkait.
        2. Berikan konsep atau rumus dasarnya dengan bahasa anak SMP.
        3. Berikan langkah pengerjaan/proses logikanya.
        4. Di bagian paling bawah, berikan "Jawaban Akhir" dengan jelas dan dicetak tebal agar siswa bisa mencocokkan hasil kerjanya.
        Jaga bahasa agar ramah dan menyemangati!`;

        let chosenModel = "models/gemini-2.0-flash"; // Menggunakan generasi 2.0 sebagai standar dasar baru
        let availableModelsText = "Tidak terdeteksi";

        try {
            // Ambil daftar model asli dari akun Google-mu
            const modelsResponse = await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${apiKeyInput}`);
            const modelsData = await modelsResponse.json();
            
            if (modelsData.models && modelsData.models.length > 0) {
                // Simpan daftarnya untuk cadangan laporan debug jika eror
                availableModelsText = modelsData.models.map(m => m.name.replace("models/", "")).join(', ');
                
                // Cari otomatis model yang mengandung kata 'flash' secara fleksibel
                const activeFlashModel = modelsData.models.find(m => m.name.toLowerCase().includes('flash'));
                if (activeFlashModel) {
                    chosenModel = activeFlashModel.name;
                } else {
                    chosenModel = modelsData.models[0].name; // Jika tidak ada tipe flash, ambil yang pertama saja
                }
            }

            // Kirim pertanyaan ke Google
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/${chosenModel}:generateContent?key=${apiKeyInput}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: systemInstruction + "\n\nPertanyaan Siswa: " + userInputInput }]
                    }]
                })
            });

            const data = await response.json();
            chatBox.removeChild(loadingDiv);

            const botDiv = document.createElement('div');
            botDiv.className = 'message bot-message';
            
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                let reply = data.candidates[0].content.parts[0].text;
                botDiv.innerHTML = reply.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            } else if (data.error) {
                // MENAMPILKAN DIAGNOSTIK JIKA EROR
                botDiv.innerHTML = `<strong>Eror dari Sistem:</strong> ${data.error.message}<br><br>
                                    <span style="color: #666; font-size: 0.85em;">
                                    🔧 <strong>Info Debug:</strong><br>
                                    • Model yang dicoba: <code>${chosenModel}</code><br>
                                    • AI yang aktif di akunmu: <code>${availableModelsText}</code>
                                    </span>`;
            } else {
                botDiv.textContent = 'Maaf, Kakak mengalami kendala format data. Coba ulangi lagi ya!';
            }
            
            chatBox.appendChild(botDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

        } catch (error) {
            if (chatBox.contains(loadingDiv)) {
                chatBox.removeChild(loadingDiv);
            }
            alert('Terjadi kesalahan jaringan.');
            console.error(error);
        }
    });
    </script>
</body>
</html>
