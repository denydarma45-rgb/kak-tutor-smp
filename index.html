<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kak Tutor - Pendamping Belajar Kelas 7</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<header>
<h1> Kak Tutor</h1>
<p>Teman setia belajar Mandiri Siswa Kelas 7 SMP</p>
</header>
<div class="api-section">
<label for="apiKey">Masukkan API Key Gemini Kamu:</label>
<input type="password" id="apiKey" placeholder="AIzaSy...">
<p class="info-text">*API Key aman, langsung diproses di browsermu tanpa
disimpan di server manapun.</p>
</div>
<div class="chat-box" id="chatBox">
<div class="message bot-message">
Halo! Aku Kak Tutor. Pilih mata pelajaranmu atau langsung ketik soal yang
membuatmu bingung di bawah ya!
</div>
</div>
<div class="input-section">
<input type="text" id="userInput" placeholder="Tulis pertanyaanmu di sini...
(Contoh: cara hitung luas lingkaran)">
<button id="sendBtn">Tanya Kakak</button>
</div>
</div>
<script href="script.js"></script>
<!-- Koreksi tag script untuk github pages jika dibutuhkan -->
<script src="script.js"></script>
</body>
</html>
